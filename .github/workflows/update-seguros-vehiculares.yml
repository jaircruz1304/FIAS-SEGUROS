name: Actualizar seguro vehicular FIAS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

concurrency:
  group: actualizar-seguro-vehicular-fias
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Generar JSON desde Excel público OneDrive/SharePoint
        run: npm run build:data
        env:
          FIAS_SEGUROS_EXCEL_URL: ${{ vars.FIAS_SEGUROS_EXCEL_URL }}
          FIAS_SEGUROS_SHARE_ID: ${{ vars.FIAS_SEGUROS_SHARE_ID }}

      - name: Verificar JSON generado
        run: |
          ls -la data
          head -c 500 data/seguros-vehiculares.json || true
          echo ""
          cat data/seguros-vehiculares-meta.json || true

      - name: Publicar cambios si existen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/seguros-vehiculares.json data/seguros-vehiculares-meta.json; then
            echo "No hay cambios en los datos."
            exit 0
          fi
          git stash push -m "datos-generados-seguros" -- data/seguros-vehiculares.json data/seguros-vehiculares-meta.json
          git pull --rebase origin main
          git stash pop || true
          git add data/seguros-vehiculares.json data/seguros-vehiculares-meta.json
          if git diff --cached --quiet; then
            echo "Después de sincronizar, no hay cambios que publicar."
            exit 0
          fi
          git commit -m "Actualizar datos de seguro vehicular FIAS"
          git push origin main
