name: Actualizar datos Seguro Vehicular FIAS - DESACTIVADO

# Este workflow queda desactivado para evitar dos despliegues simultáneos de GitHub Pages.
# La publicación real se realiza únicamente desde:
# .github/workflows/deploy-pages.yml

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desactivado:
    runs-on: ubuntu-latest
    steps:
      - name: Aviso
        run: |
          echo "Workflow desactivado."
          echo "Usa el workflow: Publicar Web FIAS desde OneDrive."
          echo "Esto evita el error: Deployment cancelled."
