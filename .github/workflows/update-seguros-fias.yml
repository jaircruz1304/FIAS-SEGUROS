name: Actualizar datos Seguro Vehicular FIAS

on:
  workflow_dispatch:
  schedule:
    # Cada 6 horas. GitHub Actions usa UTC.
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Instalar dependencias
        run: npm install

      - name: Descargar Excel desde enlace compartido de OneDrive / SharePoint
        run: node scripts/fetch-onedrive-excel.js
        env:
          FIAS_SEGUROS_EXCEL_URL: ${{ vars.FIAS_SEGUROS_EXCEL_URL }}
          FIAS_SEGUROS_SHARE_ID: ${{ vars.FIAS_SEGUROS_SHARE_ID }}
          FIAS_SHAREPOINT_DOWNLOAD_BASE: ${{ vars.FIAS_SHAREPOINT_DOWNLOAD_BASE }}

      - name: Transformar Excel completo a JSON
        run: node scripts/build-data.js

      - name: Validar datos generados
        run: node scripts/validate-seguros.js

      - name: Confirmar cambios en data/seguros
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/seguros/
          git diff --cached --quiet || git commit -m "Actualizar datos de seguro vehicular FIAS"
          git push
