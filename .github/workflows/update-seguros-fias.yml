name: Actualizar datos Seguro Vehicular FIAS

on:
  workflow_dispatch:
  schedule:
    # Cada 6 horas. GitHub Actions usa UTC.
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Descargar Excel desde OneDrive / SharePoint
        run: node scripts/fetch-onedrive-excel.js
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          OD_SITE_HOST: ${{ vars.OD_SITE_HOST }}
          OD_SITE_PATH: ${{ vars.OD_SITE_PATH }}
          OD_DRIVE_NAME: ${{ vars.OD_DRIVE_NAME }}
          OD_FILE_PATH: ${{ vars.OD_FILE_PATH }}

      - name: Transformar Excel a JSON
        run: node scripts/build-data.js

      - name: Validar datos
        run: node scripts/validate-seguros.js

      - name: Confirmar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/seguros/
          git diff --cached --quiet || git commit -m "Actualizar datos de seguro vehicular FIAS"
          git push
